# PostgreSQL (docker-compose)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:padelService}
spring.datasource.username=${DB_USER:padel}
spring.datasource.password=${DB_PASSWORD:padel}

# Nettoyage des espaces dans les variables d'environnement (au cas où)
spring.datasource.url=${spring.datasource.url// /}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Désactiver la console H2
spring.h2.console.enabled=false
