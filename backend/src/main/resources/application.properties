spring.application.name=Padel Management Backend
spring.application.version=1.0.0

# ========== DATABASE ==========
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:padelService}
spring.datasource.username=${DB_USER:padel}
spring.datasource.password=${DB_PASSWORD:padel}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========== JPA HIBERNATE ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ========== LOGGING ==========
logging.level.root=INFO
logging.level.com.padel=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ========== SERVER ==========
server.port=8080
server.servlet.context-path=/
server.error.include-message=always
server.error.include-binding-errors=always

# ========== ACTUATOR ==========
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ========== CORS ==========
server.servlet.session.timeout=30m

